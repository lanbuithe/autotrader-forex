NAME: 'MACD Trend Strategy'     # strategy name
MODULE: 'macd'                  # strategy module
CLASS: 'SimpleMACD'             # strategy class
INTERVAL: '2h'                  # stategy timeframe
#PERIOD: 300                     # candles required by strategy
#SIZING: 'risk'                  # sizing method
#RISK_PC: 1.5                    # risk per trade (%)

PARAMETERS:                     # strategy parameters
  ema_period: 200
  MACD_fast: 12
  MACD_slow: 26
  MACD_smoothing: 9
  # Exit level parameters
  RR: 1.5

WATCHLIST: ['EUR_USD', 'AUD_USD', 'GBP_USD', 'USD_CAD', 'USD_JPY']
